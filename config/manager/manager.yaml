apiVersion: apps/v1
kind: Deployment
metadata:
  name: korus-controller-manager
  namespace: korus-system
  labels:
    app.kubernetes.io/name: korus-controller-manager
    app.kubernetes.io/part-of: korus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: korus-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: korus-controller-manager
        app.kubernetes.io/part-of: korus
    spec:
      serviceAccountName: korus-controller-manager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
      - name: manager
        image: ghcr.io/surefire-ai/korus-controller-manager:latest
        imagePullPolicy: IfNotPresent
        command:
        - /controller-manager
        args:
        - --leader-elect
        - --runtime-backend=worker
        - --worker-job-image=ghcr.io/surefire-ai/korus-worker:latest
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: gateway
          containerPort: 8082
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
