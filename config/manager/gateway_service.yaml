apiVersion: v1
kind: Service
metadata:
  name: agent-control-plane-gateway
  namespace: agent-control-plane-system
  labels:
    app.kubernetes.io/name: agent-control-plane-gateway
    app.kubernetes.io/part-of: agent-control-plane
spec:
  selector:
    app.kubernetes.io/name: agent-control-plane-controller-manager
  ports:
  - name: http
    port: 8082
    targetPort: gateway
    protocol: TCP
