apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-openai
  namespace: ehs
  labels:
    app: mock-openai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-openai
  template:
    metadata:
      labels:
        app: mock-openai
    spec:
      containers:
        - name: mock-openai
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                response='{"id":"chatcmpl-mock","choices":[{"message":{"role":"assistant","content":"{\"summary\":\"inspection complete\",\"hazards\":[],\"overallRiskLevel\":\"medium\",\"nextActions\":[\"notify supervisor\"],\"confidence\":0.93,\"needsHumanReview\":false}"}}]}'
                { printf 'HTTP/1.1 200 OK\r\nContent-Type: application/json\r\nContent-Length: %s\r\n\r\n%s' "${#response}" "$response"; } | nc -l -p 8080 -w 1
              done
          ports:
            - containerPort: 8080
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: mock-openai
  namespace: ehs
  labels:
    app: mock-openai
spec:
  selector:
    app: mock-openai
  ports:
    - name: http
      port: 8080
      targetPort: http
