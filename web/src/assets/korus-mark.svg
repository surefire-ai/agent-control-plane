<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Korus mark</title>
  <desc id="desc">Abstract hexagonal node network mark for Korus agent control plane.</desc>

  <!-- Outer hexagon frame — subtle teal stroke -->
  <path d="M48 4L86 26.5V73.5L48 92L10 73.5V26.5L48 4Z"
        fill="none" stroke="#0f766e" stroke-width="2" opacity="0.3"/>

  <!-- Inner hexagon — teal gradient fill -->
  <defs>
    <linearGradient id="hex-fill" x1="10" y1="4" x2="86" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="node-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <path d="M48 12L80 31V69L48 88L16 69V31L48 12Z"
        fill="url(#hex-fill)" opacity="0.9"/>

  <!-- Network nodes — 6 vertices -->
  <circle cx="48" cy="12" r="4" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="80" cy="31" r="4" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="80" cy="69" r="4" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="48" cy="88" r="4" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="16" cy="69" r="4" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="16" cy="31" r="4" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>

  <!-- Central hub node -->
  <circle cx="48" cy="50" r="5.5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>

  <!-- Connection lines — vertices to center -->
  <g stroke="#ccfbf1" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="48" y1="16" x2="48" y2="44.5"/>
    <line x1="76.5" y1="33" x2="53.5" y2="48"/>
    <line x1="76.5" y1="67" x2="53.5" y2="52"/>
    <line x1="48" y1="84" x2="48" y2="55.5"/>
    <line x1="19.5" y1="67" x2="42.5" y2="52"/>
    <line x1="19.5" y1="33" x2="42.5" y2="48"/>
  </g>

  <!-- Edge connections — hexagon perimeter -->
  <g stroke="#ccfbf1" stroke-width="1" stroke-linecap="round" opacity="0.4">
    <line x1="52" y1="14" x2="76" y2="29"/>
    <line x1="76" y1="35" x2="76" y2="65"/>
    <line x1="76" y1="71" x2="52" y2="86"/>
    <line x1="44" y1="86" x2="20" y2="71"/>
    <line x1="20" y1="65" x2="20" y2="35"/>
    <line x1="20" y1="29" x2="44" y2="14"/>
  </g>

  <!-- Inner ring accent -->
  <circle cx="48" cy="50" r="14" fill="none" stroke="#ccfbf1" stroke-width="0.8" opacity="0.5"/>
</svg>
