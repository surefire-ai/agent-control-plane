name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: make test

      - name: Build binaries
        run: make build

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: make helm-lint

      - name: Render Helm chart
        run: make helm-template

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build controller-manager image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.controller-manager
          push: false
          tags: ghcr.io/surefire-ai/korus-controller-manager:ci

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          tags: ghcr.io/surefire-ai/korus-worker:ci
