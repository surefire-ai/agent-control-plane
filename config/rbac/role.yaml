---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: korus-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - windosx.com
  resources:
  - agentevaluations
  - agentpolicies
  - agents
  - datasets
  - knowledgebases
  - mcpservers
  - prompttemplates
  - tenants
  - toolproviders
  - workspaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - windosx.com
  resources:
  - agentevaluations/status
  - agentruns/status
  - agents/status
  - tenants/status
  - workspaces/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - windosx.com
  resources:
  - agentruns
  verbs:
  - create
  - get
  - list
  - watch
