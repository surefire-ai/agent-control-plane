apiVersion: windosx.com/v1alpha1
kind: AgentEvaluation
metadata:
  name: ehs-hazard-identification-eval-v1
  namespace: ehs
spec:
  agentRef:
    name: ehs-hazard-identification-agent
  baseline:
    revision: ehs-hazard-identification-agent-r0001
  datasetRef:
    kind: Dataset
    name: ehs-hazard-benchmark-v1
    revision: "2026-04"
  evaluators:
    - name: run_success
      type: rule
      metric: run_success
    - name: schema_validity
      type: rule
      metric: schema_validity
    - name: confidence
      type: rule
      metric: confidence
    - name: needs_human_review
      type: rule
      metric: needsHumanReview
  thresholds:
    - metric: run_success
      operator: gte
      target: 1.0
      blocking: true
    - metric: schema_validity
      operator: gte
      target: 1.0
      blocking: true
    - metric: confidence
      operator: gte
      target: 0.85
      blocking: true
    - metric: needsHumanReview
      operator: lte
      target: 0
  gate:
    mode: all_blocking
    required:
      - run_success
      - schema_validity
      - confidence
    blockOnFail: true
  reporting:
    formats:
      - summary
      - metric_breakdown
    sinks:
      - status
      - artifact
    labels:
      environment: pre-release
  runtime:
    samples:
      - name: power-box-exposed-wire
        input:
          task: identify_hazard
          payload:
            text: 发现配电箱接线端裸露，现场未设置警示标识，存在触电风险。
      - name: blocked-fire-access
        input:
          task: identify_hazard
          payload:
            text: 消防通道堆放杂物，灭火器被遮挡，人员疏散和取用消防器材受阻。
