apiVersion: windosx.com/v1alpha1
kind: AgentEvaluation
metadata:
  name: ehs-hazard-identification-eval-v1
  namespace: ehs
spec:
  agentRef:
    name: ehs-hazard-identification-agent
  baseline:
    revision: ehs-hazard-identification-agent-r0001
  datasetRef:
    kind: Dataset
    name: ehs-hazard-benchmark-v1
    revision: "2026-04"
  evaluators:
    - name: run_success
      type: rule
      metric: run_success
    - name: schema_validity
      type: rule
      metric: schema_validity
    - name: confidence
      type: rule
      metric: confidence
    - name: needs_human_review
      type: rule
      metric: needsHumanReview
  thresholds:
    - metric: run_success
      operator: gte
      target: 1.0
      blocking: true
    - metric: schema_validity
      operator: gte
      target: 1.0
      blocking: true
    - metric: confidence
      operator: gte
      target: 0.85
      blocking: true
    - metric: needsHumanReview
      operator: lte
      target: 0
  gate:
    mode: all_blocking
    required:
      - run_success
      - schema_validity
      - confidence
    blockOnFail: true
  reporting:
    formats:
      - summary
      - metric_breakdown
    sinks:
      - status
      - artifact
    labels:
      environment: pre-release
