{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-manager-role" (include "korus.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- include "korus.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - windosx.com
  resources:
  - agentevaluations
  - agentpolicies
  - agents
  - datasets
  - knowledgebases
  - mcpservers
  - prompttemplates
  - tenants
  - toolproviders
  - workspaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - windosx.com
  resources:
  - agentevaluations/status
  - agentruns/status
  - agents/status
  - tenants/status
  - workspaces/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - windosx.com
  resources:
  - agentruns
  verbs:
  - create
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-manager-rolebinding" (include "korus.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- include "korus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-manager-role" (include "korus.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
subjects:
- kind: ServiceAccount
  name: {{ include "korus.serviceAccountName" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-leader-election-role" (include "korus.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "korus.labels" . | nindent 4 }}
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-leader-election-rolebinding" (include "korus.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "korus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-leader-election-role" (include "korus.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
subjects:
- kind: ServiceAccount
  name: {{ include "korus.serviceAccountName" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
{{- end }}
