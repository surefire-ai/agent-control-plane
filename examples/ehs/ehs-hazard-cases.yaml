apiVersion: windosx.com/v1alpha1
kind: KnowledgeBase
metadata:
  name: ehs-hazard-cases
  namespace: ehs
  labels:
    windosx.com/domain: ehs
    windosx.com/kb-type: cases
spec:
  description: 历史隐患与事故案例知识库
  embedding:
    provider: openai
    model: text-embedding-3-large
  index:
    provider: pgvector
    connectionSecretRef:
      name: pgvector-secret
      key: dsn
    collection: ehs_hazard_cases
  retrieval:
    defaultTopK: 3
    defaultScoreThreshold: 0.68
  sources:
    - name: 内部隐患案例库
      uri: s3://ehs-kb/cases/internal/
    - name: 行业事故案例库
      uri: s3://ehs-kb/cases/industry/
  access:
    mode: tenant-isolated